[OUTPUT]
    Name                cloudwatch
    Match               retool-firelens-*
    region              us-west-2
    log_group_name      firelens-veetest-$(ecs_cluster)
    log_stream_name     /logs/retool/$(ecs_task_id)
    auto_create_group   true
    retry_limit         2

[OUTPUT]
    Name                forward
    Match               retool-firelens-*
    Host                127.0.0.1
    Port                9000

